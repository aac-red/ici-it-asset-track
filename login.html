<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · AssetTrack</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <main class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <img class="brand-mark" src="assets/icon-mark.png" alt="Innovative Controls">
        <h1>AssetTrack</h1>
        <p>Sign in to manage equipment loans</p>
      </div>

      <div class="login-error" id="loginError" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="field" id="emailField">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" autocomplete="username" required />
          <div class="error-msg">Enter a valid email address.</div>
        </div>

        <div class="field" id="passwordField">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
          <div class="error-msg">Enter your password.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          <span class="btn-loading-spinner"></span>
          <span class="btn-label">Sign in</span>
        </button>
      </form>

      <p class="login-footer-note">
        Accounts are created by your administrator.<br>
        Contact IT support if you need access.
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="js/auth/login-page.js"></script>
</body>
</html>
